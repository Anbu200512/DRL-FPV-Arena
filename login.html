<!DOCTYPE html>
<html lang="en" dir="ltr" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>DRL | FPV Arena - Login | Sign In to Your Account</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <script src="tailwind.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            transition: all 0.3s ease;
        }
        
        body.light {
            background: linear-gradient(135deg, #F9F6F3 0%, #f0ebe5 100%);
        }
        
        body.dark {
            background: linear-gradient(135deg, #0F172A 0%, #0a0f1a 100%);
        }
        
        /* ===== NAVBAR - Clean with only Logo and Toggles ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1rem 2rem;
            transition: all 0.3s ease;
        }
        
        body.light .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #E5E7EB;
        }
        
        body.dark .navbar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(59, 130, 246, 0.25);
        }
        
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        /* Logo - Same as other pages */
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .logo:hover {
            transform: scale(1.02);
        }
        
        .logo i {
            font-size: 1.8rem;
            color: #3B82F6;
        }
        
        .logo-text {
            font-weight: 900;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
            font-family: 'Orbitron', monospace;
            color: #3B82F6 !important;
        }
        
        /* Toggle Buttons - Clean Professional */
        .toggle-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .toggle-btn {
            width: 42px;
            height: 42px;
            border-radius: 42px;
            background: rgba(59, 130, 246, 0.1);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3B82F6;
            cursor: pointer;
            border: 1px solid rgba(59, 130, 246, 0.25);
            font-size: 14px;
            font-weight: 600;
        }
        
        .toggle-btn.large {
            width: auto;
            padding: 0 20px;
            gap: 8px;
        }
        
        .toggle-btn:hover {
            transform: translateY(-2px);
            background: #3B82F6;
            color: white;
            border-color: #3B82F6;
        }
        
        body.dark .toggle-btn {
            background: rgba(59, 130, 246, 0.2);
            color: #60A5FA;
            border-color: rgba(59, 130, 246, 0.4);
        }
        
        body.dark .toggle-btn:hover {
            background: #3B82F6;
            color: white;
        }
        
        /* Form Input Styles */
        .form-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            transition: all 0.3s ease;
            background: white;
            font-size: 1rem;
        }
        
        .dark .form-input {
            background: #1e293b;
            border-color: #334155;
            color: white;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }
        
        /* Password Input Container */
        .password-container {
            position: relative;
        }
        
        .password-container .form-input {
            padding-right: 48px;
        }
        
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9ca3af;
            transition: color 0.3s ease;
            background: transparent;
            border: none;
            font-size: 1.2rem;
        }
        
        .password-toggle:hover {
            color: #3B82F6;
        }
        
        .dark .password-toggle {
            color: #6b7280;
        }
        
        .dark .password-toggle:hover {
            color: #3B82F6;
        }
        
        /* Floating Shapes Animation */
        .shape {
            position: fixed;
            background: rgba(59, 130, 246, 0.06);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
            z-index: 0;
            pointer-events: none;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); }
            25% { transform: translateY(-30px) translateX(20px) rotate(5deg); }
            50% { transform: translateY(20px) translateX(-20px) rotate(-5deg); }
            75% { transform: translateY(-20px) translateX(10px) rotate(3deg); }
        }
        
        .shape-1 { width: 350px; height: 350px; top: -150px; right: -100px; animation-duration: 25s; }
        .shape-2 { width: 250px; height: 250px; bottom: -100px; left: -80px; animation-duration: 20s; }
        .shape-3 { width: 180px; height: 180px; top: 40%; right: 15%; animation-duration: 18s; }
        .shape-4 { width: 120px; height: 120px; bottom: 30%; left: 10%; animation-duration: 22s; }
        
        /* Or Divider */
        .or-divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #9ca3af;
        }
        
        .or-divider::before,
        .or-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .dark .or-divider::before,
        .dark .or-divider::after {
            border-bottom-color: #374151;
        }
        
        .or-divider span {
            padding: 0 10px;
            font-size: 0.875rem;
        }
        
        /* Social Button */
        .social-btn {
            width: 100%;
            padding: 12px;
            border-radius: 16px;
            border: 2px solid #e5e7eb;
            background: white;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 500;
        }
        
        .dark .social-btn {
            background: #1e293b;
            border-color: #334155;
            color: white;
        }
        
        .social-btn:hover {
            border-color: #3B82F6;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.2);
        }
        
        /* Card Glass Effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .dark .glass-card {
            background: rgba(15, 23, 42, 0.98);
        }
        
        /* Login Container */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 40px;
        }
        
        .login-card {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            padding: 40px;
        }
        
        @media (max-width: 640px) {
            .navbar {
                padding: 0.75rem 1rem;
            }
            .logo-text {
                font-size: 1.1rem;
            }
            .logo i {
                font-size: 1.4rem;
            }
            .toggle-btn {
                width: 36px;
                height: 36px;
            }
            .toggle-btn.large {
                padding: 0 14px;
            }
            .login-card {
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body class="light">

    <!-- Clean Navbar - Only Logo and Toggles -->
    <nav class="navbar">
        <div class="nav-container">
            <!-- Logo Left -->
            <a href="index.html" class="logo">
                <i class="fas fa-drone"></i>
                <span class="logo-text">DRL | FPV Arena</span>
            </a>
            
            <!-- Toggles Right -->
            <div class="toggle-group">
                <button onclick="toggleDirection()" class="toggle-btn large">
                    <i class="fas fa-arrow-right-arrow-left text-sm"></i>
                    <span>LTR</span>
                </button>
                <button onclick="toggleTheme()" class="toggle-btn">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Animated Background Shapes -->
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>

    <!-- Login Form Container -->
    <div class="login-container">
        <div class="glass-card login-card">
            <!-- Form Header -->
            <div class="text-center mb-8">
                <h2 class="text-2xl md:text-3xl font-bold text-gray-900 dark:text-white">Welcome Back!</h2>
                <p class="text-gray-500 dark:text-gray-400 text-sm mt-2">Sign in to continue</p>
            </div>

            <!-- Login Form -->
            <form onsubmit="event.preventDefault(); window.location.href='dashboard-user.html'">
                <div class="space-y-4">
                    <div>
                        <input type="email" class="form-input" placeholder="Email Address" required>
                    </div>
                    
                    <div class="password-container">
                        <input type="password" id="login-password" class="form-input" placeholder="Password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('login-password', this)">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                    
                    <div class="flex justify-between items-center">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 rounded border-gray-300 text-[#3B82F6]">
                            <span class="text-sm text-gray-600 dark:text-gray-400">Remember me</span>
                        </label>
                        <a href="#" class="text-sm text-[#3B82F6] hover:underline">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="w-full bg-gradient-to-r from-[#3B82F6] to-[#2563EB] text-white py-3 rounded-xl font-semibold text-base hover:shadow-lg transition-all">
                        Sign In
                    </button>
                </div>
            </form>

            <!-- OR Divider -->
            <div class="or-divider my-6">
                <span>or continue with</span>
            </div>

            <!-- Social Login -->
            <div class="grid grid-cols-2 gap-3">
                <button class="social-btn text-sm">
                    <i class="fab fa-google text-red-500"></i>
                    Google
                </button>
                <button class="social-btn text-sm">
                    <i class="fab fa-apple text-gray-700 dark:text-gray-300"></i>
                    Apple
                </button>
            </div>

            <!-- Sign Up Link -->
            <p class="text-center text-gray-600 dark:text-gray-400 text-sm mt-6">
                New here? 
                <a href="signup.html" class="text-[#3B82F6] font-semibold hover:underline">Create Account</a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            
            // Update the toggle button icons
            const moonIcon = document.querySelector('.toggle-btn .fa-moon');
            const sunIcon = document.querySelector('.toggle-btn .fa-sun');
            if (moonIcon && sunIcon) {
                if (document.documentElement.classList.contains('dark')) {
                    moonIcon.classList.add('hidden');
                    sunIcon.classList.remove('hidden');
                } else {
                    moonIcon.classList.remove('hidden');
                    sunIcon.classList.add('hidden');
                }
            }
        }
        
        function toggleDirection() {
            const currentDir = document.documentElement.dir;
            const newDir = currentDir === 'rtl' ? 'ltr' : 'rtl';
            document.documentElement.dir = newDir;
            const dirSpans = document.querySelectorAll('.toggle-btn.large span');
            dirSpans.forEach(span => {
                if (span.textContent === 'LTR' || span.textContent === 'RTL') {
                    span.textContent = newDir === 'rtl' ? 'RTL' : 'LTR';
                }
            });
        }
        
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        // Load saved theme
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
            document.body.classList.add('dark');
        }
        
        // Initialize direction button text
        document.addEventListener('DOMContentLoaded', () => {
            const dirSpan = document.querySelector('.toggle-btn.large span');
            if (dirSpan && document.documentElement.dir === 'rtl') {
                dirSpan.textContent = 'RTL';
            }
        });
    </script>
</body>
</html>
